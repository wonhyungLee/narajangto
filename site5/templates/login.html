<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site5 로그인</title>
  <link rel="stylesheet" href="/site5/static/style.css">
</head>
<body class="login-body">
  <div class="grain"></div>
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">Site5 Access</p>
      <h1>로그인</h1>
      <p class="lede">나라장터 모니터링 대시보드에 접근하려면 계정 인증이 필요합니다.</p>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <form method="post" action="/site5/login" class="filter-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>아이디<input name="username" autocomplete="username" autofocus required></label>
        <label>비밀번호<input name="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">접속하기</button>
      </form>
    </section>
  </main>
</body>
</html>
